name: fabric_dress_preview_ar
description: Preview fabric textures on clothing templates.
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5
  image: ^4.0.17
  tflite_flutter: ^0.9.0
  path_provider: ^2.0.11
  screenshot: ^2.0.0
  share_plus: ^7.0.0
  shared_preferences: ^2.0.15
  provider: ^6.0.3
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.0
  permission_handler: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/segmentation_model.tflite
    - assets/clothing/female/
    - assets/clothing/male/
