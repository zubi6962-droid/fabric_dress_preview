name: fabric_dress_preview_ar
description: Preview fabric textures on clothing templates.
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5
  image: ^4.0.17
  path_provider: ^2.0.11
  screenshot: ^2.0.0
  share_plus: ^7.0.0
  shared_preferences: ^2.0.15
  provider: ^6.0.3
  permission_handler: ^10.2.0
  # برای پشتیبانی از چند زبان (اختیاری)
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  # assets را فعلاً خالی بگذارید تا خطای پیدا نشدن فایل ندهد
  # assets:
  #   - assets/models/
  #   - assets/clothing/
